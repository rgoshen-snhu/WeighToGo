# git-cliff configuration for WeighToGo.
#
# Generates CHANGELOG.md from Conventional Commits in Keep-a-Changelog format.
# The web rebuild starts at v0.1.0 (Milestone 2) and the v1.0.0-android tag
# preserves the original mobile artifact at a separate version line; the
# Android tag is intentionally excluded from this changelog via skip_tags.
#
# Local usage:
#   git-cliff --tag v0.1.0 -o CHANGELOG.md          # full regenerate for a new release
#   git-cliff --unreleased --tag v0.1.0              # preview unreleased section
#
# CI usage: see .github/workflows/release.yml — fires on v* tag push.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

The original Android artifact is preserved under the `v1.0.0-android` tag and
is intentionally not listed here; this changelog tracks the web rebuild only.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %}
{% endfor %}
{% endfor %}
{% macro remote_url() %}\
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}\
{% endmacro %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "android"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

# Conventional commit type → Keep-a-Changelog section.
# Skip housekeeping types (chore, ci, build, style, test) from user-facing notes.
# Docs commits are kept because the M2 work includes substantive documentation
# deliverables (SRS, ADRs, narrative); future routine docs PRs can be filtered
# by adjusting this list.
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { body = "(?i)security", group = "Security" },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^revert", skip = true },
    { message = "^Merge", skip = true },
]

[remote.github]
owner = "rgoshen-snhu"
repo = "WeighToGo"
